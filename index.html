<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>paololopezb · Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --accent:   #58a6ff;
      --green:    #3fb950;
      --purple:   #bc8cff;
      --orange:   #ffa657;
      --red:      #f85149;
      --yellow:   #e3b341;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --tag-bg:   #21262d;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 1;
      padding: 60px 24px 48px;
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 32px;
      flex-wrap: wrap;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 2px solid var(--border);
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface);
    }

    .avatar-placeholder {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .header-info { flex: 1; min-width: 200px; }

    .prompt {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--green);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    h1 .cursor {
      display: inline-block;
      width: 3px;
      height: 1em;
      background: var(--accent);
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .bio {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      max-width: 500px;
    }

    .header-links {
      display: flex;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .header-links a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 6px;
      transition: color .2s, border-color .2s;
    }
    .header-links a:hover { color: var(--accent); border-color: var(--accent); }

    .stats-row {
      display: flex;
      gap: 20px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .stat {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }
    .stat span { color: var(--text); font-weight: 600; }

    /* ── DIVIDER ── */
    .divider {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    .divider hr {
      border: none;
      border-top: 1px solid var(--border);
    }

    /* ── MAIN ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 80px;
      position: relative;
      z-index: 1;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .section-title::before {
      content: '// ';
      color: var(--border);
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn:hover,
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d1117;
    }

    /* ── LOADING / ERROR ── */
    #status {
      text-align: center;
      padding: 60px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color .2s, transform .2s, box-shadow .2s;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(88, 166, 255, 0.08);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .repo-icon {
      color: var(--muted);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .card-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      word-break: break-word;
      flex: 1;
      line-height: 1.3;
    }

    .card-fork-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      flex-shrink: 0;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      flex: 1;
      line-height: 1.5;
    }

    .card-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .topic {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      background: rgba(56, 139, 253, 0.1);
      color: var(--accent);
      border-radius: 20px;
      padding: 2px 9px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .lang-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .lang-label {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .metric {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .updated {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--border);
      position: relative;
      z-index: 1;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; gap: 20px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div id="avatar-wrap">
    <div class="avatar-placeholder" id="avatar-placeholder">P</div>
  </div>
  <div class="header-info">
    <div class="prompt" id="prompt-line">~/paololopezb $</div>
    <h1 id="username-heading">paololopezb<span class="cursor"></span></h1>
    <p class="bio" id="user-bio">Loading profile…</p>
    <div class="header-links">
      <a href="https://github.com/paololopezb" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        github.com/paololopezb
      </a>
    </div>
    <div class="stats-row" id="stats-row"></div>
  </div>
</header>

<div class="divider"><hr /></div>

<main>
  <div class="section-header">
    <span class="section-title">public repositories</span>
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" data-lang="all">All</button>
    </div>
  </div>

  <div id="status">
    <div class="spinner"></div>
    Fetching repos from GitHub API…
  </div>

  <div class="grid" id="grid" style="display:none"></div>
</main>

<footer>
  built with the <a href="https://docs.github.com/en/rest" target="_blank">GitHub API</a> ·
  <a href="https://github.com/paololopezb" target="_blank">@paololopezb</a>
</footer>

<script>
  const USERNAME = 'paololopezb';
  const API_BASE = 'https://api.github.com';

  // Language → color map (GitHub's official palette)
  const LANG_COLORS = {
    JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5',
    HTML: '#e34c26', CSS: '#563d7c', Java: '#b07219', 'C++': '#f34b7d',
    C: '#555555', 'C#': '#178600', Go: '#00ADD8', Rust: '#dea584',
    Ruby: '#701516', PHP: '#4F5D95', Swift: '#F05138', Kotlin: '#A97BFF',
    Dart: '#00B4AB', Shell: '#89e051', Vue: '#41b883', Svelte: '#ff3e00',
    R: '#198ce7', Scala: '#c22d40', Haskell: '#5e5086', Lua: '#000080',
    MATLAB: '#e16737', Jupyter: '#DA5B0B', default: '#8b949e'
  };

  function langColor(lang) {
    return LANG_COLORS[lang] || LANG_COLORS.default;
  }

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr);
    const days = Math.floor(diff / 86400000);
    if (days === 0) return 'today';
    if (days === 1) return '1d ago';
    if (days < 30) return `${days}d ago`;
    const months = Math.floor(days / 30);
    if (months < 12) return `${months}mo ago`;
    return `${Math.floor(months / 12)}y ago`;
  }

  // SVG helpers
  const starSVG = `<svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.873 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>`;
  const forkSVG = `<svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm0 2.122a2.25 2.25 0 10-1.5 0v.878A2.25 2.25 0 005.75 8.5h1.5v2.128a2.251 2.251 0 101.5 0V8.5h1.5a2.25 2.25 0 002.25-2.25v-.878a2.25 2.25 0 10-1.5 0v.878a.75.75 0 01-.75.75h-4.5A.75.75 0 015 6.25v-.878zm3.75 7.378a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm3-8.75a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/></svg>`;
  const repoSVG = `<svg class="repo-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8zM5 12.25v3.25a.25.25 0 00.4.2l1.45-1.087a.25.25 0 01.3 0L8.6 15.7a.25.25 0 00.4-.2v-3.25a.25.25 0 00-.25-.25h-3.5a.25.25 0 00-.25.25z"/></svg>`;

  let allRepos = [];

  function buildCard(repo) {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = repo.html_url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.dataset.lang = repo.language || 'Unknown';

    const topicsHtml = (repo.topics || []).slice(0, 4)
      .map(t => `<span class="topic">${t}</span>`).join('');

    a.innerHTML = `
      <div class="card-header">
        ${repoSVG}
        <span class="card-name">${repo.name}</span>
        ${repo.fork ? '<span class="card-fork-badge">fork</span>' : ''}
      </div>
      <p class="card-desc">${repo.description || '<span style="opacity:.4">No description</span>'}</p>
      ${topicsHtml ? `<div class="card-topics">${topicsHtml}</div>` : ''}
      <div class="card-footer">
        ${repo.language ? `
          <span class="lang-label">
            <span class="lang-dot" style="background:${langColor(repo.language)}"></span>
            ${repo.language}
          </span>` : ''}
        ${repo.stargazers_count > 0 ? `<span class="metric">${starSVG} ${repo.stargazers_count}</span>` : ''}
        ${repo.forks_count > 0 ? `<span class="metric">${forkSVG} ${repo.forks_count}</span>` : ''}
        <span class="updated">${timeAgo(repo.updated_at)}</span>
      </div>`;
    return a;
  }

  function renderGrid(repos) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    if (repos.length === 0) {
      grid.innerHTML = `<p style="color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:13px;grid-column:1/-1">No repos found for this filter.</p>`;
    }
    repos.forEach(r => grid.appendChild(buildCard(r)));
    grid.style.display = 'grid';
  }

  function buildFilters(repos) {
    const langs = [...new Set(repos.map(r => r.language).filter(Boolean))].sort();
    const bar = document.getElementById('filter-bar');
    langs.forEach(lang => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.lang = lang;
      btn.textContent = lang;
      bar.appendChild(btn);
    });
    bar.addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const lang = btn.dataset.lang;
      const filtered = lang === 'all' ? allRepos : allRepos.filter(r => r.language === lang);
      renderGrid(filtered);
    });
  }

  async function loadProfile() {
    const res = await fetch(`${API_BASE}/users/${USERNAME}`);
    if (!res.ok) return;
    const u = await res.json();

    // Avatar
    const wrap = document.getElementById('avatar-wrap');
    const img = document.createElement('img');
    img.className = 'avatar';
    img.src = u.avatar_url;
    img.alt = USERNAME;
    wrap.replaceChildren(img);

    // Bio
    document.getElementById('user-bio').textContent = u.bio || 'GitHub Portfolio';

    // Stats
    const stats = document.getElementById('stats-row');
    stats.innerHTML = `
      <span class="stat"><span>${u.public_repos}</span> repos</span>
      <span class="stat"><span>${u.followers}</span> followers</span>
      <span class="stat"><span>${u.following}</span> following</span>
      ${u.location ? `<span class="stat">📍 ${u.location}</span>` : ''}
    `;
  }

  async function loadRepos() {
    const status = document.getElementById('status');
    try {
      const res = await fetch(
        `${API_BASE}/users/${USERNAME}/repos?sort=updated&per_page=100&type=public`
      );
      if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
      const repos = await res.json();

      // Sort: starred first, then by updated
      allRepos = repos.sort((a, b) =>
        b.stargazers_count - a.stargazers_count ||
        new Date(b.updated_at) - new Date(a.updated_at)
      );

      status.style.display = 'none';
      buildFilters(allRepos);
      renderGrid(allRepos);
    } catch (err) {
      status.innerHTML = `
        <p style="color:var(--red);font-family:'JetBrains Mono',monospace;font-size:13px">
          ✗ ${err.message}<br/>
          <span style="color:var(--muted);font-size:11px;margin-top:6px;display:block">
            Check your connection or GitHub API rate limit.
          </span>
        </p>`;
    }
  }

  loadProfile();
  loadRepos();
</script>
</body>
</html>
